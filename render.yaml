services:
  - type: web
    name: appgacha-backend
    runtime: python
    plan: free
    buildCommand: 'rm -rf ~/.cache/pip && pip install --upgrade pip && pip install -r requirements.txt && pip uninstall gevent -y || true'
    startCommand: 'gunicorn --workers 1 --worker-class sync --timeout 120 --bind 0.0.0.0:$PORT app_backend_clean:app'
    envVars:
      - key: FLASK_ENV
        value: production
      - key: CORS_ORIGINS
        value: '*'
      - key: JWT_SECRET
        value: your-secret-key-change-me
      - key: MONGODB_URI
        value: mongodb+srv://AppMobile04:duypro0478@cluster0.tvfipwr.mongodb.net/appgacha?retryWrites=true&w=majority&ssl=true
      - key: CACHE_BUSTER
        value: 'v1'
