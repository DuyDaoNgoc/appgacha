<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Honkai Star Rail - Login</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Arial', sans-serif;
        background: linear-gradient(135deg, #0a0a15 0%, #1a0033 50%, #0a0a15 100%);
        color: #fff;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .login-container {
        width: 100%;
        max-width: 320px;
        padding: 15px;
      }

      .login-card {
        background: rgba(26, 0, 51, 0.9);
        border: 2px solid rgba(255, 105, 180, 0.5);
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 0 50px rgba(255, 105, 180, 0.2);
      }

      .logo {
        text-align: center;
        margin-bottom: 15px;
      }

      .logo-text {
        font-size: 28px;
        font-weight: bold;
        background: linear-gradient(135deg, #ffd700 0%, #ffed4e 50%, #ffa500 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 5px;
      }

      .logo-subtitle {
        font-size: 11px;
        color: #aaa;
      }

      .form-group {
        margin-bottom: 12px;
      }

      .form-label {
        display: block;
        margin-bottom: 5px;
        font-size: 12px;
        font-weight: bold;
        color: #ffff00;
      }

      .form-input {
        width: 100%;
        padding: 8px;
        background: rgba(255, 255, 255, 0.1);
        border: 2px solid rgba(102, 126, 234, 0.3);
        border-radius: 6px;
        color: #fff;
        font-size: 12px;
        transition: all 0.3s ease;
      }

      .form-input:focus {
        outline: none;
        border-color: rgba(102, 126, 234, 1);
        background: rgba(255, 255, 255, 0.15);
      }

      .form-input::placeholder {
        color: #999;
      }

      .button-group {
        display: flex;
        gap: 8px;
        margin-top: 15px;
      }

      .btn {
        flex: 1;
        padding: 8px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: 2px solid rgba(102, 126, 234, 0.5);
        border-radius: 6px;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        font-size: 12px;
      }

      .btn:hover {
        border-color: rgba(102, 126, 234, 1);
        box-shadow: 0 0 15px rgba(102, 126, 234, 0.6);
      }

      .btn-register {
        background: linear-gradient(135deg, #ff6b6b 0%, #ff8787 100%);
        border-color: rgba(255, 107, 107, 0.5);
      }

      .btn-register:hover {
        border-color: rgba(255, 107, 107, 1);
        box-shadow: 0 0 15px rgba(255, 107, 107, 0.6);
      }

      .message {
        margin-top: 12px;
        padding: 8px;
        border-radius: 6px;
        text-align: center;
        display: none;
        font-size: 11px;
      }

      .message.success {
        background: rgba(76, 175, 80, 0.2);
        color: #90ee90;
        border: 1px solid rgba(76, 175, 80, 0.5);
        display: block;
      }

      .message.error {
        background: rgba(244, 67, 54, 0.2);
        color: #ff6b6b;
        border: 1px solid rgba(244, 67, 54, 0.5);
        display: block;
      }

      .loading {
        display: none;
        text-align: center;
        font-size: 10px;
        color: #aaa;
        margin-top: 8px;
      }

      .online-users {
        margin-top: 12px;
        padding-top: 0;
        border-top: none;
        display: none;
      }

      .online-users-title {
        font-size: 11px;
        color: #ffff00;
        margin-bottom: 8px;
        font-weight: bold;
      }

      .users-list {
        max-height: 100px;
        overflow-y: auto;
      }

      .user-item {
        padding: 4px;
        background: rgba(102, 126, 234, 0.1);
        border-left: 2px solid #667eea;
        margin-bottom: 4px;
        border-radius: 3px;
        font-size: 10px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .online-indicator {
        width: 6px;
        height: 6px;
        background: #4caf50;
        border-radius: 50%;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      .tab-buttons {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
      }

      .tab-btn {
        flex: 1;
        padding: 7px;
        background: rgba(102, 126, 234, 0.2);
        border: 2px solid rgba(102, 126, 234, 0.3);
        border-radius: 5px;
        color: #aaa;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        font-size: 11px;
      }

      .tab-btn.active {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-color: rgba(102, 126, 234, 1);
        color: #fff;
      }

      .form-section {
        display: none;
      }

      .form-section.active {
        display: block;
      }

      @media (max-height: 500px) {
        .login-card {
          padding: 15px;
        }

        .logo-text {
          font-size: 20px;
        }

        .form-label {
          font-size: 10px;
        }

        .btn {
          padding: 6px;
          font-size: 10px;
        }
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="login-card">
        <div class="logo">
          <div class="logo-text">✨ Gacha BÒ Đen✨</div>
          <div class="logo-subtitle">Bốn thòn lèn</div>
        </div>

        <!-- Tab Buttons -->
        <div class="tab-buttons">
          <button class="tab-btn active" onclick="switchTab('login')">📝 Login</button>
          <button class="tab-btn" onclick="switchTab('register')">✨ Register</button>
        </div>

        <!-- Login Form -->
        <div id="loginForm" class="form-section active">
          <div class="form-group">
            <label class="form-label">Username</label>
            <input
              type="text"
              id="loginUsername"
              class="form-input"
              placeholder="Enter your username"
            />
          </div>

          <div class="form-group">
            <label class="form-label">Password</label>
            <input
              type="password"
              id="loginPassword"
              class="form-input"
              placeholder="Enter your password"
            />
          </div>

          <div class="button-group">
            <button class="btn" onclick="handleLogin()">🎮 Login</button>
          </div>
        </div>

        <!-- Register Form -->
        <div id="registerForm" class="form-section">
          <div class="form-group">
            <label class="form-label">Username</label>
            <input
              type="text"
              id="registerUsername"
              class="form-input"
              placeholder="Create a username"
            />
          </div>

          <div class="form-group">
            <label class="form-label">Password</label>
            <input
              type="password"
              id="registerPassword"
              class="form-input"
              placeholder="Create a password"
            />
          </div>

          <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <input
              type="password"
              id="registerPasswordConfirm"
              class="form-input"
              placeholder="Confirm password"
            />
          </div>

          <div class="button-group">
            <button class="btn" onclick="handleRegister()">✨ Register</button>
          </div>
        </div>

        <div class="loading" id="loading">⏳ Processing...</div>
        <div class="message" id="message"></div>

        <!-- Online Users Section -->
        <div class="online-users">
          <div class="online-users-title">👥 Online Players</div>
          <div class="users-list" id="onlineUsersList">
            <div style="text-align: center; color: #aaa; font-size: 12px">Loading...</div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const API_URL = 'http://172.16.0.18:5000';

      // Tab switching
      function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach((btn) => btn.classList.remove('active'));
        document
          .querySelectorAll('.form-section')
          .forEach((section) => section.classList.remove('active'));

        if (tab === 'login') {
          document.querySelector('.tab-btn:first-child').classList.add('active');
          document.getElementById('loginForm').classList.add('active');
        } else {
          document.querySelector('.tab-btn:last-child').classList.add('active');
          document.getElementById('registerForm').classList.add('active');
        }
      }

      // Show message
      function showMessage(text, type = 'error') {
        const msg = document.getElementById('message');
        msg.textContent = text;
        msg.className = `message ${type}`;
        setTimeout(() => {
          msg.className = 'message';
        }, 3000);
      }

      // Handle Login
      async function handleLogin() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value.trim();

        if (!username || !password) {
          showMessage('❌ Please fill all fields', 'error');
          return;
        }

        try {
          document.getElementById('loading').style.display = 'block';

          const response = await fetch(`${API_URL}/api/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
          });

          const data = await response.json();

          if (response.ok) {
            localStorage.setItem('token', data.token);
            localStorage.setItem('user_id', data.user_id);
            localStorage.setItem('username', data.username);
            localStorage.setItem('xu', data.xu);
            localStorage.setItem('stars', data.stars);

            // Set user online
            try {
              await fetch(`${API_URL}/api/user/online`, {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  Authorization: `Bearer ${data.token}`,
                },
              });
            } catch (e) {
              console.log('Set online failed (non-critical):', e);
            }

            showMessage('✅ Login successful!', 'success');
            setTimeout(() => {
              // If in iframe, notify parent; otherwise redirect directly
              if (window.parent !== window) {
                window.parent.postMessage('LOGIN_SUCCESS', '*');
              } else {
                window.location.href = 'home.html';
              }
            }, 500);
          } else {
            showMessage(`❌ ${data.error}`, 'error');
          }
        } catch (e) {
          showMessage('❌ Connection failed', 'error');
        } finally {
          document.getElementById('loading').style.display = 'none';
        }
      }

      // Handle Register
      async function handleRegister() {
        const username = document.getElementById('registerUsername').value.trim();
        const password = document.getElementById('registerPassword').value.trim();
        const confirm = document.getElementById('registerPasswordConfirm').value.trim();

        if (!username || !password || !confirm) {
          showMessage('❌ Please fill all fields', 'error');
          return;
        }

        if (password !== confirm) {
          showMessage('❌ Passwords do not match', 'error');
          return;
        }

        if (password.length < 6) {
          showMessage('❌ Password must be at least 6 characters', 'error');
          return;
        }

        try {
          document.getElementById('loading').style.display = 'block';

          const response = await fetch(`${API_URL}/api/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
          });

          const data = await response.json();

          if (response.ok) {
            localStorage.setItem('token', data.token);
            localStorage.setItem('user_id', data.user_id);
            localStorage.setItem('username', data.username);

            // Set user online
            try {
              await fetch(`${API_URL}/api/user/online`, {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  Authorization: `Bearer ${data.token}`,
                },
              });
            } catch (e) {
              console.log('Set online failed (non-critical):', e);
            }

            showMessage('✅ Account created! Redirecting...', 'success');
            setTimeout(() => {
              // If in iframe, notify parent; otherwise redirect directly
              if (window.parent !== window) {
                window.parent.postMessage('LOGIN_SUCCESS', '*');
              } else {
                window.location.href = 'home.html';
              }
            }, 500);
          } else {
            showMessage(`❌ ${data.error}`, 'error');
          }
        } catch (e) {
          showMessage('❌ Connection failed', 'error');
        } finally {
          document.getElementById('loading').style.display = 'none';
        }
      }

      // Load online users
      async function loadOnlineUsers() {
        try {
          const response = await fetch(`${API_URL}/api/online-users`);
          const data = await response.json();
          const users = data.online_users || [];

          const list = document.getElementById('onlineUsersList');
          if (users.length === 0) {
            list.innerHTML =
              '<div style="text-align: center; color: #aaa; font-size: 12px;">No one online</div>';
          } else {
            list.innerHTML = users
              .map(
                (u) => `
                        <div class="user-item">
                            <div class="online-indicator"></div>
                            <span>${u.username}</span>
                        </div>
                    `
              )
              .join('');
          }
        } catch (e) {
          console.log('Could not load online users');
        }
      }

      // Check if already logged in
      window.addEventListener('DOMContentLoaded', () => {
        const token = localStorage.getItem('token');
        if (token) {
          window.location.href = 'home.html';
        }
        loadOnlineUsers();
        setInterval(loadOnlineUsers, 3000);
      });

      // Enter key to login/register
      document.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          const loginForm = document.getElementById('loginForm');
          const registerForm = document.getElementById('registerForm');
          if (loginForm.classList.contains('active')) {
            handleLogin();
          } else {
            handleRegister();
          }
        }
      });

      // Register Service Worker for performance
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('sw.js')
            .then((reg) => console.log('Service Worker registered'))
            .catch((err) => console.log('Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
