<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Honkai: Star Rail Gacha - Home</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Arial', sans-serif;
        background: linear-gradient(135deg, #0a0a15 0%, #1a0033 50%, #0a0a15 100%);
        color: #fff;
        min-height: 100vh;
        padding: 20px;
      }

      .home-container {
        max-width: 1200px;
        margin: 0 auto;
      }

      .header {
        text-align: center;
        margin-bottom: 40px;
      }

      .title {
        font-size: 48px;
        font-weight: bold;
        background: linear-gradient(135deg, #ffd700 0%, #ffed4e 50%, #ffa500 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 10px;
      }

      .subtitle {
        font-size: 18px;
        color: #aaa;
      }

      .section-title {
        font-size: 24px;
        color: #ffff00;
        margin: 30px 0 20px 0;
        border-bottom: 2px solid rgba(255, 255, 0, 0.3);
        padding-bottom: 10px;
      }

      /* Banner Grid */
      .banners-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 20px;
        margin-bottom: 40px;
      }

      .banner-card {
        background: linear-gradient(135deg, #1a0033, #2a0055);
        border: 2px solid rgba(255, 100, 200, 0.5);
        border-radius: 12px;
        padding: 20px;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .banner-card:hover {
        border-color: rgba(255, 100, 200, 1);
        box-shadow: 0 0 30px rgba(255, 100, 200, 0.6);
        transform: translateY(-5px);
      }

      .banner-image {
        width: 100%;
        height: 180px;
        background: rgba(100, 50, 150, 0.3);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 60px;
        font-weight: bold;
      }

      .banner-name {
        font-size: 18px;
        font-weight: bold;
        color: #ffff00;
      }

      .banner-description {
        font-size: 13px;
        color: #aaa;
        line-height: 1.4;
      }

      .banner-rarity {
        display: flex;
        gap: 5px;
        align-items: center;
      }

      .star {
        width: 16px;
        height: 16px;
        background: #ffd700;
        clip-path: polygon(
          50% 0%,
          61% 35%,
          98% 35%,
          68% 57%,
          79% 91%,
          50% 70%,
          21% 91%,
          32% 57%,
          2% 35%,
          39% 35%
        );
      }

      .banner-roll-btn {
        padding: 10px;
        background: linear-gradient(135deg, #ff1493, #ff69b4);
        border: none;
        border-radius: 6px;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .banner-roll-btn:hover {
        box-shadow: 0 0 15px rgba(255, 105, 180, 0.8);
        transform: scale(1.05);
      }

      .controls {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }

      .btn {
        padding: 12px 24px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: 2px solid rgba(102, 126, 234, 0.5);
        border-radius: 8px;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        font-size: 14px;
      }

      .btn:hover {
        border-color: rgba(102, 126, 234, 1);
        box-shadow: 0 0 15px rgba(102, 126, 234, 0.6);
      }

      .btn-admin {
        background: linear-gradient(135deg, #ff6b6b 0%, #ff8787 100%);
        border-color: rgba(255, 107, 107, 0.5);
      }

      .btn-admin:hover {
        border-color: rgba(255, 107, 107, 1);
        box-shadow: 0 0 15px rgba(255, 107, 107, 0.6);
      }

      .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: #aaa;
      }

      .empty-state-icon {
        font-size: 64px;
        margin-bottom: 20px;
      }

      .empty-state-text {
        font-size: 18px;
        margin-bottom: 20px;
      }

      @media (max-height: 500px) {
        .title {
          font-size: 32px;
        }

        .section-title {
          font-size: 18px;
          margin: 20px 0 15px 0;
        }

        .banners-grid {
          grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
          gap: 15px;
        }

        .banner-card {
          padding: 12px;
        }

        .banner-image {
          height: 120px;
          font-size: 40px;
        }

        .banner-name {
          font-size: 14px;
        }
      }
    </style>
  </head>
  <body>
    <div class="home-container">
      <div class="header">
        <div class="title">✨ HSR Gacha ✨</div>
        <div class="subtitle">Chọn banner để roll</div>
      </div>

      <div class="controls">
        <button class="btn btn-admin" onclick="goToAdmin()">⚙️ Admin</button>
        <button class="btn" onclick="location.reload()">🔄 Refresh</button>
      </div>

      <div class="section-title">📜 Available Banners</div>
      <div class="banners-grid" id="bannersGrid">
        <!-- Banners will be populated by JavaScript -->
      </div>

      <div class="empty-state" id="emptyState" style="display: none">
        <div class="empty-state-icon">📭</div>
        <div class="empty-state-text">No banners available</div>
      </div>
    </div>

    <script>
      // Load banners from localStorage
      function loadBanners() {
        let bannersData = JSON.parse(localStorage.getItem('gachaBanners') || '[]');

        if (bannersData.length === 0) {
          // Load default banners if none exist
          bannersData = [
            {
              id: 1,
              name: 'Kafka',
              description: 'A charming woman from the Antimatter Legion.',
              rarity: 5,
              color: '#ff1493',
            },
            {
              id: 2,
              name: 'Jingliu',
              description: 'The Master Swordsman.',
              rarity: 5,
              color: '#8b008b',
            },
            {
              id: 3,
              name: 'Blade',
              description: 'The Cursed Warrior.',
              rarity: 5,
              color: '#800000',
            },
            {
              id: 4,
              name: 'Dan Heng',
              description: 'The Nameless.',
              rarity: 5,
              color: '#4169e1',
            },
          ];
          localStorage.setItem('gachaBanners', JSON.stringify(bannersData));
        }
        displayBanners(bannersData);
      }

      function displayBanners(banners) {
        const grid = document.getElementById('bannersGrid');
        const emptyState = document.getElementById('emptyState');

        if (banners.length === 0) {
          emptyState.style.display = 'block';
          grid.innerHTML = '';
          return;
        }

        emptyState.style.display = 'none';
        grid.innerHTML = banners
          .map(
            (banner) => `
          <div class="banner-card">
            <div class="banner-image" style="background-color: ${banner.color};">
              ${banner.name.substring(0, 1)}
            </div>
            <div class="banner-name">${banner.name}</div>
            <div class="banner-rarity">
              ${Array(banner.rarity)
                .fill()
                .map(() => '<div class="star"></div>')
                .join('')}
            </div>
            <div class="banner-description">${banner.description}</div>
            <button class="banner-roll-btn" onclick="startRoll(${banner.id})">🎲 Roll</button>
          </div>
        `
          )
          .join('');
      }

      function startRoll(bannerId) {
        const banners = JSON.parse(localStorage.getItem('gachaBanners') || '[]');
        const banner = banners.find((b) => b.id === bannerId);
        if (banner) {
          localStorage.setItem('selectedBanner', JSON.stringify(banner));
          window.location.href = 'index.html';
        }
      }

      function goToAdmin() {
        window.location.href = 'admin.html';
      }

      // Load banners on page load
      window.addEventListener('DOMContentLoaded', loadBanners);
    </script>
  </body>
</html>
