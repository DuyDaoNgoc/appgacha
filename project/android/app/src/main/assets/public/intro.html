<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>HSR Gacha - Intro</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        font-family: 'Arial', sans-serif;
        background: linear-gradient(135deg, #0a0a15 0%, #1a0033 50%, #0a0a15 100%);
        color: #fff;
      }

      /* Intro Section */
      .intro-section {
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
        background: linear-gradient(135deg, rgba(255, 215, 0, 0.05) 0%, rgba(255, 20, 147, 0.1) 50%, rgba(102, 126, 234, 0.08) 100%);
      }

      .intro-banner {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 120px;
        font-weight: bold;
        opacity: 0.1;
        z-index: 1;
      }

      .intro-content {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 40px;
        text-align: center;
      }

      .intro-title {
        font-size: 56px;
        font-weight: bold;
        background: linear-gradient(135deg, #ffd700 0%, #ffed4e 50%, #ffa500 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        animation: glow 2s ease-in-out infinite;
      }

      .intro-subtitle {
        font-size: 20px;
        color: #aaa;
        margin-top: -30px;
      }

      .login-button {
        padding: 16px 48px;
        font-size: 18px;
        font-weight: bold;
        color: white;
        background: transparent;
        border: 3px solid rgba(102, 126, 234, 0.8);
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      .login-button:hover {
        border-color: rgba(102, 126, 234, 1);
        box-shadow: 0 0 30px rgba(102, 126, 234, 0.8), inset 0 0 20px rgba(102, 126, 234, 0.3);
        transform: scale(1.05);
      }

      .login-button:active {
        transform: scale(0.98);
      }

      @keyframes glow {
        0%, 100% {
          text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }
        50% {
          text-shadow: 0 0 40px rgba(255, 215, 0, 0.6);
        }
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .intro-title,
      .intro-subtitle,
      .login-button {
        animation: slideUp 1s ease-out forwards;
      }

      .intro-subtitle {
        animation-delay: 0.2s;
      }

      .login-button {
        animation-delay: 0.4s;
      }

      /* Login Section */
      .login-section {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        background: rgba(10, 10, 21, 0.8);
        border-top: 2px solid rgba(102, 126, 234, 0.2);
      }

      .login-card {
        width: 100%;
        max-width: 400px;
        background: rgba(26, 0, 51, 0.9);
        border: 2px solid rgba(255, 105, 180, 0.5);
        border-radius: 12px;
        padding: 30px;
        box-shadow: 0 0 50px rgba(255, 105, 180, 0.2);
        animation: slideUp 0.8s ease-out;
      }

      .login-card h2 {
        text-align: center;
        margin-bottom: 30px;
        color: #ffff00;
        font-size: 24px;
      }

      .form-group {
        margin-bottom: 15px;
      }

      .form-label {
        display: block;
        margin-bottom: 6px;
        font-size: 12px;
        font-weight: bold;
        color: #ffff00;
      }

      .form-input {
        width: 100%;
        padding: 10px;
        background: rgba(255, 255, 255, 0.1);
        border: 2px solid rgba(102, 126, 234, 0.3);
        border-radius: 6px;
        color: #fff;
        font-size: 13px;
        transition: all 0.3s ease;
      }

      .form-input:focus {
        outline: none;
        border-color: rgba(102, 126, 234, 1);
        background: rgba(255, 255, 255, 0.15);
      }

      .form-input::placeholder {
        color: #999;
      }

      .tab-buttons {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }

      .tab-btn {
        flex: 1;
        padding: 10px;
        background: rgba(102, 126, 234, 0.2);
        border: 2px solid rgba(102, 126, 234, 0.3);
        border-radius: 6px;
        color: #aaa;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        font-size: 12px;
      }

      .tab-btn.active {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-color: rgba(102, 126, 234, 1);
        color: #fff;
      }

      .form-section {
        display: none;
      }

      .form-section.active {
        display: block;
      }

      .button-group {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }

      .btn {
        flex: 1;
        padding: 12px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: 2px solid rgba(102, 126, 234, 0.5);
        border-radius: 6px;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        font-size: 13px;
      }

      .btn:hover {
        border-color: rgba(102, 126, 234, 1);
        box-shadow: 0 0 15px rgba(102, 126, 234, 0.6);
      }

      .message {
        margin-top: 15px;
        padding: 10px;
        border-radius: 6px;
        text-align: center;
        display: none;
        font-size: 12px;
      }

      .message.success {
        background: rgba(76, 175, 80, 0.2);
        color: #90ee90;
        border: 1px solid rgba(76, 175, 80, 0.5);
        display: block;
      }

      .message.error {
        background: rgba(244, 67, 54, 0.2);
        color: #ff6b6b;
        border: 1px solid rgba(244, 67, 54, 0.5);
        display: block;
      }

      .loading {
        display: none;
        text-align: center;
        font-size: 11px;
        color: #aaa;
        margin-top: 10px;
      }

      @media (max-height: 600px) {
        .intro-section {
          height: auto;
          padding: 40px 20px;
        }

        .intro-title {
          font-size: 36px;
        }

        .login-button {
          padding: 12px 32px;
          font-size: 14px;
        }
      }
    </style>
  </head>
  <body>
    <!-- Intro Section -->
    <div class="intro-section">
      <div class="intro-banner">✨ HSR Gacha ✨</div>
      <div class="intro-content">
        <h1 class="intro-title">✨ HSR Gacha ✨</h1>
        <p class="intro-subtitle">Honkai Star Rail - Gacha Simulator</p>
        <button class="login-button" onclick="scrollToLogin()">📝 Đăng Nhập</button>
      </div>
    </div>

    <!-- Login Section -->
    <div class="login-section" id="loginSection">
      <div class="login-card">
        <h2>Tài Khoản</h2>

        <!-- Tab Buttons -->
        <div class="tab-buttons">
          <button class="tab-btn active" onclick="switchTab('login')">📝 Đăng Nhập</button>
          <button class="tab-btn" onclick="switchTab('register')">✨ Đăng Ký</button>
        </div>

        <!-- Login Form -->
        <div id="loginForm" class="form-section active">
          <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" id="loginUsername" class="form-input" placeholder="Tên tài khoản" />
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" id="loginPassword" class="form-input" placeholder="Mật khẩu" />
          </div>
          <div class="button-group">
            <button class="btn" onclick="handleLogin()">🎮 Đăng Nhập</button>
          </div>
        </div>

        <!-- Register Form -->
        <div id="registerForm" class="form-section">
          <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" id="registerUsername" class="form-input" placeholder="Tên tài khoản" />
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" id="registerPassword" class="form-input" placeholder="Mật khẩu" />
          </div>
          <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <input type="password" id="registerPasswordConfirm" class="form-input" placeholder="Xác nhận mật khẩu" />
          </div>
          <div class="button-group">
            <button class="btn" onclick="handleRegister()">✨ Đăng Ký</button>
          </div>
        </div>

        <div class="loading" id="loading">⏳ Đang xử lý...</div>
        <div class="message" id="message"></div>
      </div>
    </div>

    <script>
      const API_URL = 'http://172.16.0.18:5000';

      // Check if user already logged in
      window.addEventListener('DOMContentLoaded', () => {
        const token = localStorage.getItem('token');
        if (token) {
          window.location.href = 'home.html';
        }
      });

      function scrollToLogin() {
        document.getElementById('loginSection').scrollIntoView({ behavior: 'smooth' });
      }

      function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.form-section').forEach(section => section.classList.remove('active'));

        if (tab === 'login') {
          document.querySelector('.tab-btn:first-child').classList.add('active');
          document.getElementById('loginForm').classList.add('active');
        } else {
          document.querySelector('.tab-btn:last-child').classList.add('active');
          document.getElementById('registerForm').classList.add('active');
        }
      }

      function showMessage(text, type = 'error') {
        const msg = document.getElementById('message');
        msg.textContent = text;
        msg.className = `message ${type}`;
        setTimeout(() => {
          msg.className = 'message';
        }, 3000);
      }

      async function handleLogin() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value.trim();

        if (!username || !password) {
          showMessage('❌ Vui lòng điền đầy đủ thông tin', 'error');
          return;
        }

        try {
          document.getElementById('loading').style.display = 'block';

          const response = await fetch(`${API_URL}/api/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
          });

          const data = await response.json();

          if (response.ok) {
            localStorage.setItem('token', data.token);
            localStorage.setItem('user_id', data.user_id);
            localStorage.setItem('username', data.username);
            localStorage.setItem('xu', data.xu);
            localStorage.setItem('stars', data.stars);

            try {
              await fetch(`${API_URL}/api/user/online`, {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  Authorization: `Bearer ${data.token}`,
                },
              });
            } catch (e) {
              console.log('Set online failed:', e);
            }

            showMessage('✅ Đăng nhập thành công!', 'success');
            setTimeout(() => {
              window.location.href = 'home.html';
            }, 500);
          } else {
            showMessage(`❌ ${data.error}`, 'error');
          }
        } catch (e) {
          showMessage('❌ Kết nối thất bại', 'error');
        } finally {
          document.getElementById('loading').style.display = 'none';
        }
      }

      async function handleRegister() {
        const username = document.getElementById('registerUsername').value.trim();
        const password = document.getElementById('registerPassword').value.trim();
        const confirm = document.getElementById('registerPasswordConfirm').value.trim();

        if (!username || !password || !confirm) {
          showMessage('❌ Vui lòng điền đầy đủ thông tin', 'error');
          return;
        }

        if (password !== confirm) {
          showMessage('❌ Mật khẩu không khớp', 'error');
          return;
        }

        if (password.length < 6) {
          showMessage('❌ Mật khẩu phải tối thiểu 6 ký tự', 'error');
          return;
        }

        try {
          document.getElementById('loading').style.display = 'block';

          const response = await fetch(`${API_URL}/api/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
          });

          const data = await response.json();

          if (response.ok) {
            localStorage.setItem('token', data.token);
            localStorage.setItem('user_id', data.user_id);
            localStorage.setItem('username', data.username);

            try {
              await fetch(`${API_URL}/api/user/online`, {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  Authorization: `Bearer ${data.token}`,
                },
              });
            } catch (e) {
              console.log('Set online failed:', e);
            }

            showMessage('✅ Đăng ký thành công!', 'success');
            setTimeout(() => {
              window.location.href = 'home.html';
            }, 500);
          } else {
            showMessage(`❌ ${data.error}`, 'error');
          }
        } catch (e) {
          showMessage('❌ Kết nối thất bại', 'error');
        } finally {
          document.getElementById('loading').style.display = 'none';
        }
      }
    </script>
  </body>
</html>
