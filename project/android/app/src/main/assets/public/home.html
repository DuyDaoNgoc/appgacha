<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Honkai: Star Rail Gacha - Home</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Arial', sans-serif;
        background: linear-gradient(135deg, #0a0a15 0%, #1a0033 50%, #0a0a15 100%);
        color: #fff;
        min-height: 100vh;
        padding: 20px;
      }

      .home-container {
        max-width: 1200px;
        margin: 0 auto;
      }

      .header {
        text-align: center;
        margin-bottom: 40px;
      }

      .title {
        font-size: 48px;
        font-weight: bold;
        background: linear-gradient(135deg, #ffd700 0%, #ffed4e 50%, #ffa500 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 10px;
      }

      .subtitle {
        font-size: 18px;
        color: #aaa;
      }

      .section-title {
        font-size: 24px;
        color: #ffff00;
        margin: 30px 0 20px 0;
        border-bottom: 2px solid rgba(255, 255, 0, 0.3);
        padding-bottom: 10px;
      }

      /* Tab Navigation */
      .nav-tabs {
        display: flex;
        gap: 12px;
        margin-bottom: 25px;
        border-bottom: 2px solid rgba(255, 105, 180, 0.3);
        padding-bottom: 12px;
        overflow-x: auto;
      }

      .nav-tab {
        padding: 10px 16px;
        background: rgba(102, 126, 234, 0.1);
        border: 2px solid rgba(102, 126, 234, 0.3);
        border-radius: 8px;
        color: #aaa;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        white-space: nowrap;
      }

      .nav-tab:hover {
        border-color: rgba(102, 126, 234, 0.6);
      }

      .nav-tab.active {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-color: rgba(102, 126, 234, 1);
        color: #fff;
      }

      .tab-content {
        display: none;
      }

      .tab-content.active {
        display: block;
      }

      /* Banner Grid */
      .banners-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 20px;
        margin-bottom: 40px;
      }

      .banner-card {
        background: linear-gradient(135deg, #1a0033, #2a0055);
        border: 2px solid rgba(255, 100, 200, 0.5);
        border-radius: 12px;
        padding: 20px;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .banner-card:hover {
        border-color: rgba(255, 100, 200, 1);
        box-shadow: 0 0 30px rgba(255, 100, 200, 0.6);
        transform: translateY(-5px);
      }

      .banner-image {
        width: 100%;
        height: 180px;
        background: rgba(100, 50, 150, 0.3);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 60px;
        font-weight: bold;
      }

      .banner-name {
        font-size: 18px;
        font-weight: bold;
        color: #ffff00;
      }

      .banner-description {
        font-size: 13px;
        color: #aaa;
        line-height: 1.4;
      }

      .banner-rarity {
        display: flex;
        gap: 5px;
        align-items: center;
      }

      .star {
        width: 16px;
        height: 16px;
        background: #ffd700;
        clip-path: polygon(
          50% 0%,
          61% 35%,
          98% 35%,
          68% 57%,
          79% 91%,
          50% 70%,
          21% 91%,
          32% 57%,
          2% 35%,
          39% 35%
        );
      }

      .banner-roll-btn {
        padding: 10px;
        background: linear-gradient(135deg, #ff1493, #ff69b4);
        border: none;
        border-radius: 6px;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .banner-roll-btn:hover {
        box-shadow: 0 0 15px rgba(255, 105, 180, 0.8);
        transform: scale(1.05);
      }

      .controls {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }

      .btn {
        padding: 12px 24px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: 2px solid rgba(102, 126, 234, 0.5);
        border-radius: 8px;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        font-size: 14px;
      }

      .btn:hover {
        border-color: rgba(102, 126, 234, 1);
        box-shadow: 0 0 15px rgba(102, 126, 234, 0.6);
      }

      .btn-admin {
        background: linear-gradient(135deg, #ff6b6b 0%, #ff8787 100%);
        border-color: rgba(255, 107, 107, 0.5);
      }

      .btn-admin:hover {
        border-color: rgba(255, 107, 107, 1);
        box-shadow: 0 0 15px rgba(255, 107, 107, 0.6);
      }

      .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: #aaa;
      }

      .empty-state-icon {
        font-size: 64px;
        margin-bottom: 20px;
      }

      .empty-state-text {
        font-size: 18px;
        margin-bottom: 20px;
      }

      /* Friends Section */
      .friends-container {
        width: 100%;
      }
      .friends-search {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }
      .search-input {
        flex: 1;
        padding: 12px 16px;
        background: rgba(255, 255, 255, 0.05);
        border: 2px solid rgba(102, 126, 234, 0.3);
        border-radius: 8px;
        color: #fff;
        font-size: 14px;
      }
      .search-input::placeholder {
        color: #666;
      }
      .search-input:focus {
        outline: none;
        border-color: rgba(102, 126, 234, 1);
        box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
      }
      .friends-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 15px;
      }
      .friend-card {
        background: rgba(102, 126, 234, 0.15);
        border: 2px solid rgba(102, 126, 234, 0.3);
        border-radius: 12px;
        padding: 16px;
        text-align: center;
        transition: all 0.3s ease;
        cursor: pointer;
      }
      .friend-card:hover {
        background: rgba(102, 126, 234, 0.25);
        border-color: rgba(102, 126, 234, 0.6);
        box-shadow: 0 0 15px rgba(102, 126, 234, 0.3);
      }
      .friend-avatar {
        font-size: 48px;
        margin-bottom: 10px;
      }
      .friend-username {
        font-size: 16px;
        color: #fff;
        font-weight: bold;
        margin-bottom: 5px;
      }
      .friend-status {
        font-size: 12px;
        color: #aaa;
        margin-bottom: 12px;
      }
      .friend-status.online {
        color: #4ade80;
      }
      .friend-actions {
        display: flex;
        gap: 8px;
      }
      .friend-action-btn {
        flex: 1;
        padding: 8px 12px;
        background: rgba(102, 126, 234, 0.2);
        border: 1px solid rgba(102, 126, 234, 0.5);
        border-radius: 6px;
        color: #fff;
        font-size: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
      }
      .friend-action-btn:hover {
        background: rgba(102, 126, 234, 0.4);
        border-color: rgba(102, 126, 234, 1);
      }

      /* Messages Section */
      .messages-container {
        width: 100%;
      }
      .messages-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .message-item {
        background: rgba(102, 126, 234, 0.15);
        border: 2px solid rgba(102, 126, 234, 0.3);
        border-radius: 12px;
        padding: 16px;
        transition: all 0.3s ease;
        cursor: pointer;
      }
      .message-item:hover {
        background: rgba(102, 126, 234, 0.25);
        border-color: rgba(102, 126, 234, 0.6);
      }
      .message-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }
      .message-from {
        font-size: 16px;
        color: #fff;
        font-weight: bold;
      }
      .message-time {
        font-size: 12px;
        color: #aaa;
      }
      .message-subject {
        font-size: 14px;
        color: #ffff00;
        margin-bottom: 8px;
      }
      .message-content {
        font-size: 13px;
        color: #bbb;
        line-height: 1.4;
        margin-bottom: 10px;
      }
      .message-reward {
        font-size: 12px;
        color: #4ade80;
        margin-bottom: 10px;
      }
      .message-actions {
        display: flex;
        gap: 10px;
      }
      .message-action-btn {
        padding: 8px 16px;
        background: rgba(102, 126, 234, 0.3);
        border: 1px solid rgba(102, 126, 234, 0.5);
        border-radius: 6px;
        color: #fff;
        font-size: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
      }
      .message-action-btn:hover {
        background: rgba(102, 126, 234, 0.5);
        border-color: rgba(102, 126, 234, 1);
      }
      .message-action-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      /* Settings Section */
      .settings-container {
        max-width: 600px;
      }
      .profile-section,
      .preferences-section,
      .logout-section {
        background: rgba(102, 126, 234, 0.1);
        border: 2px solid rgba(102, 126, 234, 0.3);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 20px;
      }
      .profile-section h3,
      .preferences-section h3 {
        color: #ffff00;
        font-size: 18px;
        margin-bottom: 15px;
        border-bottom: 2px solid rgba(255, 255, 0, 0.2);
        padding-bottom: 10px;
      }
      .profile-info {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .info-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 0;
        border-bottom: 1px solid rgba(102, 126, 234, 0.2);
      }
      .info-row:last-child {
        border-bottom: none;
      }
      .info-label {
        color: #aaa;
        font-size: 14px;
      }
      .info-value {
        color: #fff;
        font-weight: bold;
        font-size: 14px;
      }
      .pref-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 0;
        border-bottom: 1px solid rgba(102, 126, 234, 0.2);
      }
      .pref-row:last-child {
        border-bottom: none;
      }
      .pref-row label {
        color: #fff;
        font-size: 14px;
        font-weight: 500;
      }
      .pref-row input[type='checkbox'] {
        width: 20px;
        height: 20px;
        cursor: pointer;
        accent-color: #667eea;
      }
      .logout-section {
        text-align: center;
      }
      .logout-section .btn {
        width: 100%;
      }

      @media (max-height: 500px) {
        .title {
          font-size: 32px;
        }
        .section-title {
          font-size: 18px;
          margin: 20px 0 15px 0;
        }
        .banners-grid {
          grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
          gap: 15px;
        }
        .banner-card {
          padding: 12px;
        }
        .banner-image {
          height: 120px;
          font-size: 40px;
        }
        .banner-name {
          font-size: 14px;
        }
      }
    </style>
  </head>
  <body>
    <div class="home-container">
      <div class="header">
        <div class="title">✨ Gacha Bốn Thòn Lèn ✨</div>
        <div class="subtitle">Chọn banner để roll</div>
      </div>

      <div class="controls">
        <button class="btn btn-admin" onclick="goToAdmin()">⚙️ Admin</button>
        <button class="btn" onclick="location.reload()">🔄 Refresh</button>
      </div>

      <!-- Navigation Tabs -->
      <div class="nav-tabs">
        <button class="nav-tab active" onclick="switchHomeTab('banners')">📜 Banners</button>
        <button class="nav-tab" onclick="switchHomeTab('friends')">👥 Friends</button>
        <button class="nav-tab" onclick="switchHomeTab('messages')">💌 Messages</button>
        <button class="nav-tab" onclick="switchHomeTab('settings')">⚙️ Settings</button>
      </div>

      <!-- Banners Tab -->
      <div class="tab-content active" id="bannersTab">
        <div class="section-title">📜 Available Banners</div>
        <div class="banners-grid" id="bannersGrid"></div>
        <div class="empty-state" id="emptyState" style="display: none">
          <div class="empty-state-icon">📭</div>
          <div class="empty-state-text">No banners available</div>
        </div>
      </div>

      <!-- Friends Tab -->
      <div class="tab-content" id="friendsTab">
        <div class="section-title">👥 Friends</div>
        <div class="friends-container">
          <div class="friends-search">
            <input
              type="text"
              id="friendSearchInput"
              placeholder="Search friends..."
              class="search-input"
            />
            <button class="btn" onclick="showAddFriendModal()">➕ Add</button>
          </div>
          <div class="friends-grid" id="friendsGrid"></div>
          <div class="empty-state" id="emptyFriends" style="display: none">
            <div class="empty-state-icon">👤</div>
            <div class="empty-state-text">No friends yet!</div>
          </div>
        </div>
      </div>

      <!-- Messages Tab -->
      <div class="tab-content" id="messagesTab">
        <div class="section-title">💌 Messages</div>
        <div class="messages-container">
          <div class="messages-list" id="messagesList"></div>
          <div class="empty-state" id="emptyMessages" style="display: none">
            <div class="empty-state-icon">📭</div>
            <div class="empty-state-text">No messages</div>
          </div>
        </div>
      </div>

      <!-- Settings Tab -->
      <div class="tab-content" id="settingsTab">
        <div class="section-title">⚙️ Settings</div>
        <div class="settings-container">
          <div class="profile-section">
            <h3>Profile</h3>
            <div class="profile-info">
              <div class="info-row">
                <span class="info-label">Username:</span>
                <span class="info-value" id="profileUsername">-</span>
              </div>
              <div class="info-row">
                <span class="info-label">Status:</span>
                <span class="info-value" id="profileStatus">🟢 Online</span>
              </div>
              <div class="info-row">
                <span class="info-label">Level:</span>
                <span class="info-value" id="profileLevel">1</span>
              </div>
              <div class="info-row">
                <span class="info-label">Balance:</span>
                <span class="info-value"
                  ><span id="profileXu">0</span> ⭐ <span id="profileStars">0</span></span
                >
              </div>
            </div>
          </div>
          <div class="preferences-section">
            <h3>Preferences</h3>
            <div class="pref-row">
              <label>Sound Effects</label>
              <input type="checkbox" id="soundToggle" checked />
            </div>
            <div class="pref-row">
              <label>Notifications</label>
              <input type="checkbox" id="notificationToggle" checked />
            </div>
          </div>
          <div class="logout-section">
            <button class="btn btn-admin" onclick="logout()">🚪 Logout</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      // ============ API Configuration ============
      const API_URL = 'https://appgacha.onrender.com';

      function loadBanners() {
        let bannersData = JSON.parse(localStorage.getItem('gachaBanners') || '[]');
        if (bannersData.length === 0) {
          bannersData = [
            {
              id: 1,
              name: 'Kafka',
              description: 'Antimatter Legion.',
              rarity: 5,
              color: '#ff1493',
            },
            {
              id: 2,
              name: 'Jingliu',
              description: 'Master Swordsman.',
              rarity: 5,
              color: '#8b008b',
            },
            { id: 3, name: 'Blade', description: 'Cursed Warrior.', rarity: 5, color: '#800000' },
            { id: 4, name: 'Dan Heng', description: 'The Nameless.', rarity: 5, color: '#4169e1' },
          ];
          localStorage.setItem('gachaBanners', JSON.stringify(bannersData));
        }
        displayBanners(bannersData);
      }

      function displayBanners(banners) {
        const grid = document.getElementById('bannersGrid');
        const emptyState = document.getElementById('emptyState');
        if (banners.length === 0) {
          emptyState.style.display = 'block';
          grid.innerHTML = '';
          return;
        }
        emptyState.style.display = 'none';
        grid.innerHTML = banners
          .map(
            (b) => `
          <div class="banner-card">
            <div class="banner-image" style="background-color: ${b.color};">${b.name.substring(0, 1)}</div>
            <div class="banner-name">${b.name}</div>
            <div class="banner-rarity">${Array(b.rarity)
              .fill()
              .map(() => '<div class="star"></div>')
              .join('')}</div>
            <div class="banner-description">${b.description}</div>
            <button class="banner-roll-btn" onclick="startRoll(${b.id})">🎲 Roll</button>
          </div>`
          )
          .join('');
      }

      function startRoll(bannerId) {
        const banners = JSON.parse(localStorage.getItem('gachaBanners') || '[]');
        const banner = banners.find((b) => b.id === bannerId);
        if (banner) {
          localStorage.setItem('selectedBanner', JSON.stringify(banner));
          window.location.href = 'index.html';
        }
      }

      function switchHomeTab(tabName) {
        document.querySelectorAll('.tab-content').forEach((t) => t.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach((t) => t.classList.remove('active'));
        const selectedTab = document.getElementById(tabName + 'Tab');
        if (selectedTab) selectedTab.classList.add('active');
        event.target.classList.add('active');
        if (tabName === 'friends') loadFriends();
        else if (tabName === 'messages') loadMessages();
        else if (tabName === 'settings') loadSettings();
      }

      function loadFriends() {
        const friendsData = JSON.parse(localStorage.getItem('userFriends') || '[]');
        displayFriends(friendsData);
      }

      function displayFriends(friends) {
        const grid = document.getElementById('friendsGrid');
        const emptyState = document.getElementById('emptyFriends');
        if (friends.length === 0) {
          emptyState.style.display = 'block';
          grid.innerHTML = '';
          return;
        }
        emptyState.style.display = 'none';
        grid.innerHTML = friends
          .map(
            (f) => `
          <div class="friend-card">
            <div class="friend-avatar">👤</div>
            <div class="friend-username">${f.username}</div>
            <div class="friend-status ${f.online ? 'online' : ''}">
              ${f.online ? '🟢 Online' : '⚪ Offline'}
            </div>
            <div class="friend-actions">
              <button class="friend-action-btn" onclick="messageFriend('${f.id}')">💬 Chat</button>
              <button class="friend-action-btn" onclick="removeFriend('${f.id}')">❌ Delete</button>
            </div>
          </div>`
          )
          .join('');
      }

      function showAddFriendModal() {
        const username = prompt('Enter username:');
        if (username && username.trim().length > 0) addFriend(username.trim());
      }

      function addFriend(username) {
        const friendsData = JSON.parse(localStorage.getItem('userFriends') || '[]');
        if (friendsData.some((f) => f.username === username)) {
          alert('Already in friends!');
          return;
        }
        friendsData.push({
          id: Date.now().toString(),
          username: username,
          online: Math.random() > 0.5,
        });
        localStorage.setItem('userFriends', JSON.stringify(friendsData));
        loadFriends();
      }

      function removeFriend(friendId) {
        if (confirm('Remove?')) {
          let friendsData = JSON.parse(localStorage.getItem('userFriends') || '[]');
          friendsData = friendsData.filter((f) => f.id !== friendId);
          localStorage.setItem('userFriends', JSON.stringify(friendsData));
          loadFriends();
        }
      }

      function messageFriend(friendId) {
        alert('Coming soon!');
      }

      function loadMessages() {
        const messagesData = JSON.parse(localStorage.getItem('userMessages') || '[]');
        displayMessages(messagesData);
      }

      function displayMessages(messages) {
        const list = document.getElementById('messagesList');
        const emptyState = document.getElementById('emptyMessages');
        if (messages.length === 0) {
          emptyState.style.display = 'block';
          list.innerHTML = '';
          return;
        }
        emptyState.style.display = 'none';
        list.innerHTML = messages
          .map(
            (msg, idx) => `
          <div class="message-item">
            <div class="message-header">
              <div class="message-from">From: ${msg.from}</div>
              <div class="message-time">${msg.date}</div>
            </div>
            <div class="message-subject">${msg.subject}</div>
            <div class="message-content">${msg.content}</div>
            ${msg.reward ? `<div class="message-reward">Reward: ${msg.reward}</div>` : ''}
            <div class="message-actions">
              <button class="message-action-btn" onclick="claimReward(${idx})" ${msg.claimed ? 'disabled' : ''}>
                ${msg.claimed ? '✓ Claimed' : '📥 Claim'}
              </button>
              <button class="message-action-btn" onclick="deleteMessage(${idx})">🗑️ Delete</button>
            </div>
          </div>`
          )
          .join('');
      }

      function claimReward(idx) {
        let messagesData = JSON.parse(localStorage.getItem('userMessages') || '[]');
        if (messagesData[idx]) {
          messagesData[idx].claimed = true;
          localStorage.setItem('userMessages', JSON.stringify(messagesData));
          alert('Claimed!');
          loadMessages();
        }
      }

      function deleteMessage(idx) {
        if (confirm('Delete?')) {
          let messagesData = JSON.parse(localStorage.getItem('userMessages') || '[]');
          messagesData.splice(idx, 1);
          localStorage.setItem('userMessages', JSON.stringify(messagesData));
          loadMessages();
        }
      }

      function loadSettings() {
        const username = localStorage.getItem('username') || 'Player';
        const xu = localStorage.getItem('xu') || '0';
        const stars = localStorage.getItem('stars') || '0';
        document.getElementById('profileUsername').textContent = username;
        document.getElementById('profileXu').textContent = xu;
        document.getElementById('profileStars').textContent = stars;
      }

      async function logout() {
        if (confirm('Logout?')) {
          try {
            const token = localStorage.getItem('token');
            if (token) {
              fetch(`${API_URL}/api/logout`, {
                method: 'POST',
                headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
                keepalive: true,
              }).catch((e) => console.log('Logout error:', e));
            }
          } catch (e) {
            console.log('Logout error:', e);
          }
          localStorage.clear();
          sessionStorage.clear();
          window.location.href = 'login.html';
        }
      }

      window.addEventListener('beforeunload', async () => {
        const token = localStorage.getItem('token');
        if (token) {
          try {
            fetch('https://appgacha.onrender.com/api/logout', {
              method: 'POST',
              headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
              keepalive: true,
            }).catch((e) => {});
          } catch (e) {}
        }
      });

      window.addEventListener('DOMContentLoaded', () => {
        loadBanners();
        loadSettings();
        const existingMessages = JSON.parse(localStorage.getItem('userMessages') || '[]');
        if (existingMessages.length === 0) {
          const sampleMessages = [
            {
              from: 'System',
              subject: 'Welcome',
              content: 'Welcome!',
              reward: '100 ⭐',
              date: 'Today',
              claimed: false,
            },
            {
              from: 'Admin',
              subject: 'Event',
              content: 'New event!',
              reward: '500 Xu',
              date: 'Yesterday',
              claimed: false,
            },
          ];
          localStorage.setItem('userMessages', JSON.stringify(sampleMessages));
        }
      });
    </script>
  </body>
</html>
